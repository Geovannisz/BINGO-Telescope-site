name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      use_cloud:
        description: 'Emergência: Usar Nuvem do GitHub (ubuntu-latest)?'
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ${{ github.event.inputs.use_cloud == 'true' && 'ubuntu-latest' || 'self-hosted' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (Cloud - com cache)
        if: github.event.inputs.use_cloud == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Node.js (Local - sem cache de rede)
        if: github.event.inputs.use_cloud != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache Astro modules (Cloud only)
        if: github.event.inputs.use_cloud == 'true'
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .astro
          key: ${{ runner.os }}-astro-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-astro-

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Commit and push synced publications
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/publications/
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-sync publications from team members [skip ci]"
            git push origin main
          else
            echo "Nenhuma nova publicação para sincronizar."
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ${{ github.event.inputs.use_cloud == 'true' && 'ubuntu-latest' || 'self-hosted' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4