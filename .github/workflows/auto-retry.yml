name: Auto-retry Deploy

on:
  workflow_run:
    workflows: ["Deploy to GitHub Pages"]
    types:
      - completed

permissions:
  actions: write
  contents: read

jobs:
  retry-if-failed:
    runs-on: ubuntu-latest
    # Roda somente se a pipeline original falhar ou for cancelada pelo Runner
    if: ${{ github.event.workflow_run.conclusion == 'failure' || github.event.workflow_run.conclusion == 'cancelled' }}
    steps:
      - name: Auto-Retry Trigger
        uses: actions/github-script@v7
        with:
          script: |
            const run_id = context.payload.workflow_run.id;
            const attempt = context.payload.workflow_run.run_attempt;
            const max_attempts = 3;
            
            console.log(`=== Auto-Retry Vigia ===`);
            console.log(`Tentativa atual que falhou: ${attempt}`);
            console.log(`Limite maximo de tentativas: ${max_attempts}`);
            
            if (attempt < max_attempts) {
              console.log(`> Iniciando tentativa numero ${attempt + 1}...`);
              
              // Dispara o re-run dos jobs que falharam ou foram cancelados
              await github.rest.actions.reRunWorkflowFailedJobs({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run_id,
              });
              
            } else {
              console.log('> Limite de tentativas atingido. Abortando processo definitivamente.');
              core.setFailed('Numero maximo de tentativas (3) foi excedido sem sucesso.');
            }
