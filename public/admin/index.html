<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BINGO Telescope — Content Manager</title>
    <style>
      /* --- BINGO THEME PARA O DECAP CMS --- */
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap');
      
      body, button, input, select, textarea {
        font-family: 'Outfit', sans-serif !important;
      }

      /* 1. Header (Top Bar) */
      header {
        background-color: #020617 !important;
        border-bottom: 1px solid rgba(34, 211, 238, 0.3) !important;
        box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important;
      }
      header a, header button, header span, header svg {
        color: #e2e8f0 !important;
      }
      /* Corrige as linhas ciano do header */
      header a[class*="active"] {
        box-shadow: inset 0 -3px 0 #06b6d4 !important;
      }

      /* 2. Sidebar */
      aside {
        background-color: #0f172a !important;
        border-right: 1px solid rgba(34, 211, 238, 0.1) !important;
      }
      aside h2 {
        color: #22d3ee !important;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-size: 14px !important;
      }
      aside a {
        color: #94a3b8 !important;
        border-radius: 8px !important;
        margin: 4px 12px !important;
        transition: all 0.2s ease !important;
        background-color: transparent !important; /* Força remover fundo branco */
      }
      aside a:hover {
        background-color: rgba(34, 211, 238, 0.1) !important;
        color: #22d3ee !important;
      }
      /* Item ativo na Sidebar */
      aside a[aria-current="page"], aside a[class*="active"] {
        background-color: rgba(34, 211, 238, 0.15) !important;
        color: #22d3ee !important;
        border-left: 3px solid #06b6d4 !important;
      }

      /* 3. Main Area */
      main {
        background-color: #f8fafc !important;
      }
      main > div > div:first-child {
        border-bottom: none !important;
      }
      main h1 {
        color: #0f172a !important;
        font-weight: 700 !important;
      }

      /* Toggles e botões secundários em cinza */
      main span[class*="IconWrapper"], main span[class*="Toggle"] {
        color: #64748b !important;
      }

      /* 4. Primary Buttons ("New Notícias", "Publish") */
      main a[href*="/create"], main button[color="primary"], main [class*="Button-button-default-primary"], [data-testid="create-button"] {
        background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%) !important;
        border: none !important;
        color: white !important;
        border-radius: 8px !important;
        font-weight: 600 !important;
        box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3) !important;
        padding: 8px 16px !important;
        transition: transform 0.2s, box-shadow 0.2s !important;
      }
      main a[href*="/create"]:hover, main button[color="primary"]:hover, [data-testid="create-button"]:hover {
        transform: translateY(-2px) !important;
        box-shadow: 0 6px 15px rgba(59, 130, 246, 0.4) !important;
      }

      /* 5. Cards */
      main a[class*="Card"] {
        background-color: #ffffff !important;
        border-radius: 12px !important;
        border: 1px solid #e2e8f0 !important;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05) !important;
        transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s !important;
        padding: 16px !important;
      }
      main a[class*="Card"]:hover {
        transform: translateY(-4px) !important;
        box-shadow: 0 12px 20px rgba(0,0,0,0.1) !important;
        border-color: #3b82f6 !important;
      }
      /* Remove o fundo branco interno bizarro dos cards */
      main a[class*="Card"] > div {
        background-color: transparent !important;
        border: none !important;
        box-shadow: none !important;
        padding: 0 !important;
      }
      main a[class*="Card"] h2 {
        color: #1e293b !important;
        font-weight: 700 !important;
      }
    </style>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      // Garante que o texto mude caso o CSS não pegue por causa de iframes/shadow DOM
      const observer = new MutationObserver(() => {
        const btns = document.querySelectorAll('button');
        btns.forEach(btn => {
          if (btn.textContent.includes('Login with GitHub')) {
            btn.textContent = 'Acessar Painel BINGO';
          }
        });
      });
      observer.observe(document.body, { childList: true, subtree: true });
    </script>
  </body>
</html>
